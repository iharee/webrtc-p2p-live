<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer - WebRTC Live</title>
  <link rel="stylesheet" href="style.css">
  <script>
    const zh = (navigator.language || '').startsWith('zh');
    document.documentElement.lang = zh ? 'zh-CN' : 'en';
    document.title = zh ? '观众端 - WebRTC Live' : 'Viewer - WebRTC Live';
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('status').textContent = zh ? '准备就绪' : 'Ready';
      document.getElementById('joinBtn').textContent = zh ? '加入直播' : 'Join Stream';
    });
  </script>
</head>
<body>
  <div class="container">
    <audio id="remoteAudio" autoplay playsinline hidden></audio>
    <div id="qualityBar" class="quality-bar" style="display:none">
      <button data-quality="auto">Auto</button>
      <button data-quality="low">Standard</button>
      <button data-quality="high" class="active">High</button>
      <input type="number" id="customBitrate" min="1000" max="20000" step="500" placeholder="kbps" disabled>
      <button data-quality="custom" id="customBtn">Custom</button>
    </div>
    <video id="remoteVideo" autoplay playsinline controls></video>
    <div id="status" class="status"></div>
    <button id="joinBtn"></button>
  </div>
  <script src="config.js"></script>
  <script src="signaling.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
