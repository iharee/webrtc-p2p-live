<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broadcaster - WebRTC Live</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="toastContainer"></div>
  <div class="container">
    <audio id="remoteAudio" autoplay playsinline hidden></audio>
    <div id="tokenBar" class="token-bar">
      <label id="tokenLabel">Token</label>
      <input type="text" id="tokenInput" maxlength="64" placeholder="auto-generated">
      <button id="tokenBtn" class="btn-ghost">Save</button>
    </div>
    <video id="localVideo" autoplay playsinline muted controls></video>
    <div id="status" class="status"></div>
    <button id="startBtn" class="btn-primary"></button>
  </div>
  <script src="/config.js"></script>
  <script src="/signaling.js"></script>
  <script src="/broadcaster.js"></script>
</body>
</html>
